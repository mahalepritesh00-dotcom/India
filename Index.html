<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family: 'Poppins', sans-serif;
height:100vh;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
color:white;
}

/* Center content */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* Title animation */

h1{
font-size:60px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px yellow;}
}

/* Quote */

.quote{
font-size:24px;
margin-top:20px;
opacity:0;
animation: fadeIn 3s forwards 2s;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* Button */

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
background:white;
color:#ff4081;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Hidden message */

#surprise{
display:none;
font-size:28px;
margin-top:25px;
color:#fff;
}

/* Balloons */

.balloon{
position:absolute;
bottom:-100px;
width:50px;
height:70px;
background:red;
border-radius:50%;
animation:float 10s infinite;
}

.balloon::after{
content:'';
position:absolute;
width:2px;
height:60px;
background:white;
left:50%;
top:70px;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday ❤️</h1>

<p class="quote">
"You are so beautiful.  
Not just in how you look,  
but in the way you smile,  
the way you care,  
and the way you make my world brighter."
</p>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<div id="surprise">
🎉 I’m so lucky to have you.  
Happy Birthday My Beautiful Girl ❤️
</div>

</div>

<script>

/* Surprise message */

function showSurprise(){
document.getElementById("surprise").style.display="block";
}

/* Create floating balloons */

function createBalloon(){
let balloon=document.createElement("div");
balloon.classList.add("balloon");

balloon.style.left=Math.random()*100+"vw";
balloon.style.background=
"rgb("+
Math.random()*255+","+
Math.random()*255+","+
Math.random()*255+")";

balloon.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(balloon);

setTimeout(()=>{
balloon.remove();
},10000);
}

setInterval(createBalloon,800);

</script>

</body>
</html>
